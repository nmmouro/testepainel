<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Nome</title>

    <link rel="stylesheet" href="css/cadastro.css">
</head>

<body>

    <button id="btnMenu" class="btn-menu">
        ← Menu Principal
    </button>

    <div class="card">

        <h1>Cadastro</h1>

        <form id="formulario">

            <label>Nome</label>
            <select id="nome" required>
                <option value="">Carregando...</option>
            </select>

            <label>Veículo</label>
            <select id="veiculo" required>
                <option value="">Carregando...</option>
            </select>

            <label>Passageiro / Setor / Motivo</label>
            <input type="text" id="motivo">

            <label>Itinerário</label>
            <input type="text" id="itinerario">

            <label for="horarioInicial">Horário Inicial</label>
            <input type="time" id="horarioInicial">

            <label for="kmInicial">Km Inicial</label>
            <input type="number" id="kmInicial">

            <label for="horarioFinal">Horário Final</label>
            <input type="time" id="horarioFinal">            
            
            <label for="kmFinal">Km Final</label>
            <input type="number" id="kmFinal">            

            <label for="distanciaPercorrida">Distância Percorrida</label>
            <input type="number" id="distanciaPercorrida"readonly>

            <label>Status</label>
            <input type="text" id="status" readonly>

            <button type="submit">
                Salvar
            </button>
                    
        </form>

        <div id="mensagem"></div>

    </div>

    
<script>
document.getElementById("btnMenu")
    .addEventListener("click", () => {
        window.location.href = "index.html";
    });
</script>


    <script src="js/cadastro.js"></script>

</body>

</html>
